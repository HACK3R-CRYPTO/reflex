[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "london"
test = "test"
script = "script"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@somnia-chain/reactivity-contracts/=node_modules/@somnia-chain/reactivity-contracts/"
]
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
somnia_testnet = "${SOMNIA_RPC_URL}"

[etherscan]
somnia_testnet = { key = "${SOMNIA_EXPLORER_KEY}", url = "https://explorer-testnet.somnia.network/api" }
