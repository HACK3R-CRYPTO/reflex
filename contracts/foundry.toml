[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
somnia_testnet = "${SOMNIA_RPC_URL}"

[etherscan]
somnia_testnet = { key = "${ETHERSCAN_API_KEY}" }
