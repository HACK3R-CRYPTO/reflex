[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
optimizer = true
optimizer_runs = 200
solc = "0.8.24"

[rpc_endpoints]
somnia_testnet = "${SOMNIA_RPC_URL}"

[etherscan]
somnia_testnet = { key = "${SOMNIA_EXPLORER_KEY}", url = "https://explorer-testnet.somnia.network/api" }
